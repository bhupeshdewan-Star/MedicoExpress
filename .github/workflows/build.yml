name: Workspace Build Validation

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json
            apps/api-core/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install web build dependencies
        run: npm install --include=optional
        working-directory: apps/web

      - name: Build web app
        run: npm run build
        working-directory: apps/web

      - name: Check API syntax
        run: |
          node --check apps/api-core/server.js
          node --check apps/api-core/services/repository_engine.js
