name: Workspace Test Verification Suite

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json
            apps/api-core/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint Styles Checks
        run: npm run lint --workspace apps/web

      - name: Run Core Logic Unit Tests
        run: npm run test
