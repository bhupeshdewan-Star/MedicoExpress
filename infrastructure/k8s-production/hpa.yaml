apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: clincommand-api-hpa
  namespace: clincommand-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: clincommand-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: clincommand-web-hpa
  namespace: clincommand-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: clincommand-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
