version: '3.8'

services:
  # 1. Database persistence
  postgres:
    image: postgres:16-alpine
    container_name: clincommand-postgres-prod
    environment:
      POSTGRES_DB: clincommand
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: enterprise-prod-db-password-9988
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clincommand"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 2. Redis Caching
  redis:
    image: redis:7-alpine
    container_name: clincommand-redis-prod
    command: redis-server --requirepass enterprise-prod-redis-secret
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "enterprise-prod-redis-secret", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 3. API Core Gateway & static web server
  api:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: clincommand-api-prod
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=enterprise-prod-db-password-9988
      - DB_NAME=clincommand
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=enterprise-prod-redis-secret
      - JWT_SECRET=clincommand-secret-key-100-percent-secure-gxp-audit
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 4. Observability monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: clincommand-prometheus-prod
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

volumes:
  postgres_prod_data:
  redis_prod_data:
